<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>飛翔小鳥 - 極限反應 - 雅寶遊戲間</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #1a202c;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
                /* ============================================================
           頁首樣式（與首頁一致）
           ============================================================ */
        .site-header {
            background: #005A9C;
            color: white;
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 2px 8px rgba(0,0,0,0.10);
            width: 100%;
        }
        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo {
            font-size: 20px;
            font-weight: 700;
            color: white;
            text-decoration: none;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .logo:hover { color: rgba(255,255,255,0.85); }
        .nav-links {
            display: flex;
            gap: 20px;
            font-size: 14px;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            transition: color 0.2s;
        }
        .nav-links a:hover {
            color: white;
            border-bottom: 2px solid #00A86B;
        }
        .nav-links .game-link {
            background: rgba(255,255,255,0.15);
            padding: 4px 14px;
            border-radius: 20px;
            font-weight: 500;
        }
        .nav-links .game-link:hover {
            border-bottom: none;
            background: rgba(255,255,255,0.25);
        }
                /* ============================================================
           頁尾樣式（與首頁一致）
           ============================================================ */
        .site-footer {
            background: #2D3748;
            color: #A0AEC0;
            padding: 40px 0 28px 0;
            margin-top: 40px;
            font-size: 14px;
            width: 100%;
        }
        .footer-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            text-align: center;
        }
        .footer-inner .copy {
            font-size: 13px;
            color: #718096;
        }
        .footer-inner .declaration {
            font-size: 12px;
            color: #FF6F61;
            letter-spacing: 1px;
            font-weight: 300;
            margin-top: 4px;
        }
        .footer-inner a {
            color: #A0AEC0;
            text-decoration: none;
        }
        .footer-inner a:hover {
            color: white;
            text-decoration: underline;
        }
        .game-container {
            background: #2d3748;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.4);
            max-width: 400px;
            width: 100%;
            text-align: center;
            margin: 20px 0;
        }
        h1 { color: white; margin-bottom: 4px; font-size: 28px; }
        .desc { color: #a0aec0; font-size: 14px; margin-bottom: 16px; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            color: white;
        }
        .header .info {
            background: #1a202c;
            padding: 4px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
        }
        canvas {
            background: #1a202c;
            border-radius: 12px;
            display: block;
            margin: 0 auto;
            width: 100%;
            max-width: 360px;
            aspect-ratio: 360 / 500;
            cursor: pointer;
        }
        .controls {
            margin-top: 16px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .controls button {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: #48bb78;
            color: white;
        }
        .controls button:hover { background: #38a169; transform: scale(1.02); }
        .message {
            margin-top: 12px;
            font-size: 14px;
            color: #a0aec0;
        }
        @media (max-width: 480px) { h1 { font-size: 22px; } }
    </style>
</head>
<body>
        <header class="site-header">
        <div class="header-inner">
            <a href="/" class="logo">雅寶社區 · 頂客論壇</a>
            <nav class="nav-links">
                <a href="/">首頁</a>
                <a href="/memorial.html">歲月迴聲</a>
                <a href="/royal_dragon_karma.html">公義史錄</a>
                <a href="/categories.html">📚 全部分類</a>
                <a href="/game/" class="game-link">🎮 遊戲間</a>
            </nav>
        </div>
    </header>
    <div class="game-container">
        <h1>🐦 飛翔小鳥 - 極限反應</h1>
        <p class="desc">控制小鳥穿越障礙，挑戰你的反應極限！</p>
        <div class="header">
            <span class="info">🏆 分數 <span id="score">0</span></span>
            <span class="info">🏅 最高 <span id="best">0</span></span>
        </div>
        <canvas id="gameCanvas" width="360" height="500"></canvas>
        <div class="controls">
            <button onclick="initGame()">🔄 新遊戲</button>
        </div>
        <div class="message" id="message">點擊畫面或按空白鍵跳躍！</div>
    </div>
        <footer class="site-footer">
        <div class="footer-inner">
            <div class="copy">&copy; 2026 雅寶社區 · 頂客論壇 (AHPAL.COM) — 版權所有</div>
            <div style="margin-top:6px;font-size:13px;">
                <a href="/sitemap.xml" style="color:#A0AEC0;text-decoration:none;margin:0 12px;">📄 Sitemap</a>
                <a href="/categories.html" style="color:#A0AEC0;text-decoration:none;margin:0 12px;">📚 全部分類</a>
                <a href="/game/" style="color:#A0AEC0;text-decoration:none;margin:0 12px;">🎮 遊戲間</a>
            </div>
            <div class="declaration">「從社區法治，走向知識共創」</div>
        </div>
    </footer>
    <script>
        var canvas = document.getElementById('gameCanvas');
        var ctx = canvas.getContext('2d');
        var W = 360, H = 500;
        var bird = { x: 60, y: 250, r: 12, vy: 0, gravity: 0.4, jump: -7 };
        var pipes = [];
        var score = 0;
        var bestScore = parseInt(localStorage.getItem('flappyBest')) || 0;
        var gameRunning = false;
        var gameLoop = null;
        var pipeGap = 140;
        var pipeWidth = 50;
        var pipeSpeed = 2.5;

        function initGame() {
            if (gameLoop) cancelAnimationFrame(gameLoop);
            bird.y = 250;
            bird.vy = 0;
            pipes = [];
            score = 0;
            gameRunning = true;
            document.getElementById('score').textContent = score;
            document.getElementById('best').textContent = bestScore;
            document.getElementById('message').textContent = '點擊畫面或按空白鍵跳躍！';
            gameLoop = requestAnimationFrame(update);
        }

        function update() {
            if (!gameRunning) return;
            bird.vy += bird.gravity;
            bird.y += bird.vy;
            if (bird.y - bird.r < 0 || bird.y + bird.r > H) { gameOver(); return; }

            if (pipes.length === 0 || pipes[pipes.length - 1].x < W - 180) {
                var topHeight = Math.random() * (H - pipeGap - 80) + 40;
                pipes.push({
                    x: W,
                    top: topHeight,
                    bottom: topHeight + pipeGap,
                    scored: false
                });
            }

            for (var i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= pipeSpeed;
                if (pipes[i].x + pipeWidth < 0) { pipes.splice(i, 1); continue; }
                if (!pipes[i].scored && pipes[i].x + pipeWidth < bird.x - bird.r) {
                    pipes[i].scored = true;
                    score++;
                    document.getElementById('score').textContent = score;
                }
                if (bird.x + bird.r > pipes[i].x && bird.x - bird.r < pipes[i].x + pipeWidth) {
                    if (bird.y - bird.r < pipes[i].top || bird.y + bird.r > pipes[i].bottom) {
                        gameOver(); return;
                    }
                }
            }

            draw();
            gameLoop = requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = '#2d3748';
            ctx.fillRect(0, 0, W, H);
            for (var i = 0; i < pipes.length; i++) {
                var p = pipes[i];
                ctx.fillStyle = '#48bb78';
                ctx.fillRect(p.x, 0, pipeWidth, p.top);
                ctx.fillRect(p.x, p.bottom, pipeWidth, H - p.bottom);
                ctx.fillStyle = '#38a169';
                ctx.fillRect(p.x - 4, p.top - 20, pipeWidth + 8, 20);
                ctx.fillRect(p.x - 4, p.bottom, pipeWidth + 8, 20);
            }
            ctx.fillStyle = '#f6e05e';
            ctx.shadowColor = 'rgba(246,224,94,0.5)';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.arc(bird.x, bird.y, bird.r, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'white';
            ctx.font = '20px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('🐦', bird.x, bird.y + 6);
        }

        function jump() {
            if (!gameRunning) return;
            bird.vy = bird.jump;
        }

        function gameOver() {
            gameRunning = false;
            if (gameLoop) cancelAnimationFrame(gameLoop);
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('flappyBest', bestScore);
                document.getElementById('best').textContent = bestScore;
            }
            document.getElementById('message').textContent = '💀 遊戲結束！分數：' + score;
        }

        canvas.addEventListener('click', jump);
        canvas.addEventListener('touchstart', function(e) { e.preventDefault(); jump(); });
        document.addEventListener('keydown', function(e) { if (e.key === ' ') { e.preventDefault(); jump(); } });

        initGame();
    </script>
</body>
</html>
