<head>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #f0f4f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
                /* ============================================================
           頁首樣式（與首頁一致）
           ============================================================ */
        .site-header {
            background: #005A9C;
            color: white;
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 2px 8px rgba(0,0,0,0.10);
            width: 100%;
        }
        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo {
            font-size: 20px;
            font-weight: 700;
            color: white;
            text-decoration: none;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .logo:hover { color: rgba(255,255,255,0.85); }
        .nav-links {
            display: flex;
            gap: 20px;
            font-size: 14px;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            transition: color 0.2s;
        }
        .nav-links a:hover {
            color: white;
            border-bottom: 2px solid #00A86B;
        }
        .nav-links .game-link {
            background: rgba(255,255,255,0.15);
            padding: 4px 14px;
            border-radius: 20px;
            font-weight: 500;
        }
        .nav-links .game-link:hover {
            border-bottom: none;
            background: rgba(255,255,255,0.25);
        }
                /* ============================================================
           頁尾樣式（與首頁一致）
           ============================================================ */
        .site-footer {
            background: #2D3748;
            color: #A0AEC0;
            padding: 40px 0 28px 0;
            margin-top: 40px;
            font-size: 14px;
            width: 100%;
        }
        .footer-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            text-align: center;
        }
        .footer-inner .copy {
            font-size: 13px;
            color: #718096;
        }
        .footer-inner .declaration {
            font-size: 12px;
            color: #FF6F61;
            letter-spacing: 1px;
            font-weight: 300;
            margin-top: 4px;
        }
        .footer-inner a {
            color: #A0AEC0;
            text-decoration: none;
        }
        .footer-inner a:hover {
            color: white;
            text-decoration: underline;
        }
        .game-container {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
            margin: 20px 0;
        }
        h1 { color: #2d3748; margin-bottom: 4px; font-size: 28px; }
        .desc { color: #718096; font-size: 14px; margin-bottom: 16px; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .header .info {
            background: #edf2f7;
            padding: 4px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
        }
        .question {
            font-size: 48px;
            font-weight: 700;
            color: #2d3748;
            margin: 16px 0;
        }
        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            max-width: 300px;
            margin: 0 auto;
        }
        .options button {
            padding: 16px;
            border: 3px solid #e2e8f0;
            border-radius: 12px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
            color: #2d3748;
        }
        .options button:hover { transform: scale(1.03); border-color: #005A9C; }
        .options button.correct { border-color: #48bb78; background: #c6f6d5; }
        .options button.wrong { border-color: #fc8181; background: #fed7d7; }
        .options button:disabled { cursor: not-allowed; opacity: 0.7; }
        .controls {
            margin-top: 16px;
        }
        .controls button {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: #005A9C;
            color: white;
        }
        .controls button:hover { background: #003d66; transform: scale(1.02); }
        .message {
            margin-top: 12px;
            font-size: 14px;
            color: #4a5568;
        }
        .message.win { color: #38a169; font-weight: 700; }
        @media (max-width: 480px) {
            h1 { font-size: 22px; }
            .question { font-size: 32px; }
        }
    </style>
</head>
<body>
        <header class="site-header">
        <div class="header-inner">
            <a href="/" class="logo">雅寶社區 · 頂客論壇</a>
            <nav class="nav-links">
                <a href="/">首頁</a>
                <a href="/memorial.html">歲月迴聲</a>
                <a href="/royal_dragon_karma.html">公義史錄</a>
                <a href="/categories.html">📚 全部分類</a>
                <a href="/game/" class="game-link">🎮 遊戲間</a>
            </nav>
        </div>
    </header>
    <div class="game-container">
        <h1>🧠 數學速算 - 腦力激盪</h1>
        <p class="desc">在時間內回答數學問題，考驗你的計算能力！</p>
        <div class="header">
            <span class="info">✅ 正確 <span id="correct">0</span></span>
            <span class="info">❌ 錯誤 <span id="wrong">0</span></span>
            <span class="info">⏱️ <span id="timer">60</span>s</span>
        </div>
        <div class="question" id="question">準備開始</div>
        <div class="options" id="options"></div>
        <div class="controls">
            <button onclick="initGame()">🔄 新遊戲</button>
        </div>
        <div class="message" id="message">點擊「新遊戲」開始挑戰！</div>
    </div>
        <footer class="site-footer">
        <div class="footer-inner">
            <div class="copy">&copy; 2026 雅寶社區 · 頂客論壇 (AHPAL.COM) — 版權所有</div>
            <div style="margin-top:6px;font-size:13px;">
                <a href="/sitemap.xml" style="color:#A0AEC0;text-decoration:none;margin:0 12px;">📄 Sitemap</a>
                <a href="/categories.html" style="color:#A0AEC0;text-decoration:none;margin:0 12px;">📚 全部分類</a>
                <a href="/game/" style="color:#A0AEC0;text-decoration:none;margin:0 12px;">🎮 遊戲間</a>
            </div>
            <div class="declaration">「從社區法治，走向知識共創」</div>
        </div>
    </footer>
    <script>
    (function() {
        var correct = 0;
        var wrong = 0;
        var timeLeft = 60;
        var timerInterval = null;
        var gameRunning = false;
        var currentAnswer = 0;

        window.initGame = function() {
            if (timerInterval) clearInterval(timerInterval);
            correct = 0;
            wrong = 0;
            timeLeft = 60;
            gameRunning = true;
            document.getElementById('correct').textContent = correct;
            document.getElementById('wrong').textContent = wrong;
            document.getElementById('timer').textContent = timeLeft;
            document.getElementById('message').textContent = '答對越多，分數越高！';
            document.getElementById('message').className = 'message';
            nextQuestion();
            timerInterval = setInterval(function() {
                timeLeft--;
                document.getElementById('timer').textContent = timeLeft;
                if (timeLeft <= 0) {
                    gameRunning = false;
                    clearInterval(timerInterval);
                    document.getElementById('message').textContent = '🏁 時間到！答對 ' + correct + ' 題，答錯 ' + wrong + ' 題！';
                    document.getElementById('message').className = 'message win';
                    document.getElementById('options').innerHTML = '';
                    document.getElementById('question').textContent = '時間到！';
                }
            }, 1000);
        };

        function nextQuestion() {
            if (!gameRunning) return;
            var operations = ['+', '-', '×'];
            var op = operations[Math.floor(Math.random() * operations.length)];
            var a, b, answer;
            switch(op) {
                case '+':
                    a = Math.floor(Math.random() * 20) + 1;
                    b = Math.floor(Math.random() * 20) + 1;
                    answer = a + b;
                    break;
                case '-':
                    a = Math.floor(Math.random() * 20) + 1;
                    b = Math.floor(Math.random() * a) + 1;
                    answer = a - b;
                    break;
                case '×':
                    a = Math.floor(Math.random() * 10) + 1;
                    b = Math.floor(Math.random() * 10) + 1;
                    answer = a * b;
                    break;
            }
            currentAnswer = answer;
            document.getElementById('question').textContent = a + ' ' + op + ' ' + b + ' = ?';

            var options = [answer];
            while (options.length < 4) {
                var offset = Math.floor(Math.random() * 10) + 1;
                var fake = answer + (Math.random() > 0.5 ? offset : -offset);
                if (fake > 0 && options.indexOf(fake) === -1) options.push(fake);
            }
            options.sort(function() { return Math.random() - 0.5; });

            var optionsEl = document.getElementById('options');
            optionsEl.innerHTML = '';
            for (var i = 0; i < options.length; i++) {
                var btn = document.createElement('button');
                btn.textContent = options[i];
                btn.addEventListener('click', (function(opt) {
                    return function() { checkAnswer(this, opt); };
                })(options[i]));
                optionsEl.appendChild(btn);
            }
        }

        function checkAnswer(btn, value) {
            if (!gameRunning) return;
            var btns = document.querySelectorAll('.options button');
            for (var i = 0; i < btns.length; i++) {
                btns[i].disabled = true;
            }

            var isCorrect = (value === currentAnswer);
            if (isCorrect) {
                btn.classList.add('correct');
                correct++;
                document.getElementById('correct').textContent = correct;
                document.getElementById('message').textContent = '✅ 正確！太棒了！';
            } else {
                btn.classList.add('wrong');
                for (var j = 0; j < btns.length; j++) {
                    if (parseInt(btns[j].textContent) === currentAnswer) {
                        btns[j].classList.add('correct');
                    }
                }
                wrong++;
                document.getElementById('wrong').textContent = wrong;
                document.getElementById('message').textContent = '❌ 錯誤！答案是 ' + currentAnswer;
            }

            setTimeout(function() {
                for (var k = 0; k < btns.length; k++) {
                    btns[k].className = '';
                    btns[k].disabled = false;
                }
                if (gameRunning) nextQuestion();
            }, 800);
        }
    })();
    </script>
</body>
</html>
