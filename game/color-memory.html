<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>色彩記憶 - 顏色順序挑戰 - 雅寶遊戲間</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #f0f4f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
                /* ============================================================
           頁首樣式（與首頁一致）
           ============================================================ */
        .site-header {
            background: #005A9C;
            color: white;
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 2px 8px rgba(0,0,0,0.10);
            width: 100%;
        }
        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo {
            font-size: 20px;
            font-weight: 700;
            color: white;
            text-decoration: none;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .logo:hover { color: rgba(255,255,255,0.85); }
        .nav-links {
            display: flex;
            gap: 20px;
            font-size: 14px;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            transition: color 0.2s;
        }
        .nav-links a:hover {
            color: white;
            border-bottom: 2px solid #00A86B;
        }
        .nav-links .game-link {
            background: rgba(255,255,255,0.15);
            padding: 4px 14px;
            border-radius: 20px;
            font-weight: 500;
        }
        .nav-links .game-link:hover {
            border-bottom: none;
            background: rgba(255,255,255,0.25);
        }
                /* ============================================================
           頁尾樣式（與首頁一致）
           ============================================================ */
        .site-footer {
            background: #2D3748;
            color: #A0AEC0;
            padding: 40px 0 28px 0;
            margin-top: 40px;
            font-size: 14px;
            width: 100%;
        }
        .footer-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            text-align: center;
        }
        .footer-inner .copy {
            font-size: 13px;
            color: #718096;
        }
        .footer-inner .declaration {
            font-size: 12px;
            color: #FF6F61;
            letter-spacing: 1px;
            font-weight: 300;
            margin-top: 4px;
        }
        .footer-inner a {
            color: #A0AEC0;
            text-decoration: none;
        }
        .footer-inner a:hover {
            color: white;
            text-decoration: underline;
        }
        .game-container {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
            margin: 20px 0;
        }
        h1 { color: #2d3748; margin-bottom: 4px; font-size: 28px; }
        .desc { color: #718096; font-size: 14px; margin-bottom: 16px; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .header .info {
            background: #edf2f7;
            padding: 4px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
        }
        .color-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 350px;
            margin: 12px auto;
        }
        .color-btn {
            aspect-ratio: 1;
            border-radius: 12px;
            border: 3px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.2s;
        }
        .color-btn:hover { transform: scale(1.05); }
        .color-btn:disabled { cursor: not-allowed; opacity: 0.7; }
        .color-btn.active { transform: scale(0.95); border-color: #005A9C; }
        .controls {
            margin-top: 16px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .controls button {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: #005A9C;
            color: white;
        }
        .controls button:hover { background: #003d66; transform: scale(1.02); }
        .message {
            margin-top: 12px;
            font-size: 14px;
            color: #4a5568;
        }
        .message.win { color: #38a169; font-weight: 700; }
        @media (max-width: 480px) { h1 { font-size: 22px; } }
    </style>
</head>
<body>
        <header class="site-header">
        <div class="header-inner">
            <a href="/" class="logo">雅寶社區 · 頂客論壇</a>
            <nav class="nav-links">
                <a href="/">首頁</a>
                <a href="/memorial.html">歲月迴聲</a>
                <a href="/royal_dragon_karma.html">公義史錄</a>
                <a href="/categories.html">📚 全部分類</a>
                <a href="/game/" class="game-link">🎮 遊戲間</a>
            </nav>
        </div>
    </header>
    <div class="game-container">
        <h1>🎨 色彩記憶 - 顏色順序挑戰</h1>
        <p class="desc">記住顏色順序，挑戰你的記憶力！</p>
        <div class="header">
            <span class="info">🎯 回合 <span id="round">1</span></span>
            <span class="info">⭐ 分數 <span id="score">0</span></span>
        </div>
        <div class="color-panel" id="colorPanel"></div>
        <div class="controls">
            <button onclick="initGame()">🔄 新遊戲</button>
        </div>
        <div class="message" id="message">觀察顏色順序，然後重複點擊！</div>
    </div>
        <footer class="site-footer">
        <div class="footer-inner">
            <div class="copy">&copy; 2026 雅寶社區 · 頂客論壇 (AHPAL.COM) — 版權所有</div>
            <div style="margin-top:6px;font-size:13px;">
                <a href="/sitemap.xml" style="color:#A0AEC0;text-decoration:none;margin:0 12px;">📄 Sitemap</a>
                <a href="/categories.html" style="color:#A0AEC0;text-decoration:none;margin:0 12px;">📚 全部分類</a>
                <a href="/game/" style="color:#A0AEC0;text-decoration:none;margin:0 12px;">🎮 遊戲間</a>
            </div>
            <div class="declaration">「從社區法治，走向知識共創」</div>
        </div>
    </footer>
    <script>
        const COLORS = ['#e53e3e', '#3182ce', '#38a169', '#ecc94b', '#805ad5', '#ed8936', '#ed64a6', '#319795'];
        let sequence = [];
        let playerSequence = [];
        let round = 1;
        let score = 0;
        let isPlaying = false;
        let isPlayerTurn = false;

        function initGame() {
            sequence = [];
            playerSequence = [];
            round = 1;
            score = 0;
            isPlaying = true;
            isPlayerTurn = false;
            document.getElementById('round').textContent = round;
            document.getElementById('score').textContent = score;
            document.getElementById('message').textContent = '觀察顏色順序，然後重複點擊！';
            document.getElementById('message').className = 'message';
            renderColors();
            setTimeout(() => playSequence(), 500);
        }

        function renderColors() {
            const panel = document.getElementById('colorPanel');
            panel.innerHTML = '';
            for (let i = 0; i < COLORS.length; i++) {
                const btn = document.createElement('div');
                btn.className = 'color-btn';
                btn.style.background = COLORS[i];
                btn.dataset.index = i;
                btn.addEventListener('click', () => handleColorClick(i));
                panel.appendChild(btn);
            }
        }

        function playSequence() {
            isPlayerTurn = false;
            const btns = document.querySelectorAll('.color-btn');
            btns.forEach(b => b.disabled = true);
            
            sequence.push(Math.floor(Math.random() * COLORS.length));
            
            let i = 0;
            const interval = setInterval(() => {
                if (i >= sequence.length) {
                    clearInterval(interval);
                    isPlayerTurn = true;
                    playerSequence = [];
                    btns.forEach(b => b.disabled = false);
                    document.getElementById('message').textContent = '輪到你了！重複點擊！';
                    return;
                }
                const idx = sequence[i];
                btns[idx].classList.add('active');
                setTimeout(() => btns[idx].classList.remove('active'), 300);
                i++;
            }, 600);
        }

        function handleColorClick(index) {
            if (!isPlayerTurn || !isPlaying) return;
            
            const btns = document.querySelectorAll('.color-btn');
            const expected = sequence[playerSequence.length];
            
            if (index === expected) {
                playerSequence.push(index);
                btns[index].classList.add('active');
                setTimeout(() => btns[index].classList.remove('active'), 200);
                
                if (playerSequence.length === sequence.length) {
                    isPlayerTurn = false;
                    btns.forEach(b => b.disabled = true);
                    score += 10 * round;
                    round++;
                    document.getElementById('score').textContent = score;
                    document.getElementById('round').textContent = round;
                    document.getElementById('message').textContent = '✅ 正確！進入下一回合！';
                    setTimeout(() => {
                        playSequence();
                    }, 800);
                }
            } else {
                isPlaying = false;
                btns.forEach(b => b.disabled = true);
                document.getElementById('message').textContent = '❌ 順序錯誤！遊戲結束！';
                document.getElementById('message').className = 'message';
            }
        }

        initGame();
    </script>
</body>
</html>
