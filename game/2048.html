        .cell[data-value="64"] { background: #f65e3b; color: #f9f6f2; }
        .cell[data-value="128"] { background: #edcf72; color: #f9f6f2; font-size: 28px; }
        .cell[data-value="256"] { background: #edcc61; color: #f9f6f2; font-size: 28px; }
        .cell[data-value="512"] { background: #edc850; color: #f9f6f2; font-size: 28px; }
        .cell[data-value="1024"] { background: #edc53f; color: #f9f6f2; font-size: 22px; }

            cursor: pointer;

        .controls .new-game { background: #f65e3b; }
        .controls .new-game:hover { background: #f77a5a; }
        .game-over {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(238, 228, 218, 0.9);
            border-radius: 12px;
            justify-content: center;

        .game-over button {

    <!-- 遊戲容器 -->
    <div class="game-container">
        <div class="header">
            <h1>2048</h1>
            <div class="score-box">
                <div class="label">分數</div>
                <div class="value" id="score">0</div>
            </div>
        </div>
        <div class="game-wrapper">
            <div class="grid" id="grid"></div>
            <div class="game-over" id="gameOver">

                <p>最終分數：<span id="finalScore">0</span></p>
                <button onclick="initGame()">🔄 重新開始</button>

        相同數字的方塊碰撞後會合併，目標是拼出 <strong>2048</strong> 方塊！
        每次移動都會在空白處產生一個新的 2 或 4。</p>

    <script src="https://giscus.app/client.js"
        data-repo="praystone/ahpal-website"
        data-repo-id="R_kgDOTbvurg"
        data-category="Announcements"
        data-category-id="DIC_kwDOTbvurs4DBhek"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"

        data-lang="zh-TW"
        crossorigin="anonymous"
        async>

    <script>
        let grid = [];
        let score = 0;
        let gameOver = false;
        const size = 4;

        function initGame() {
            grid = Array.from({length: size}, () => Array(size).fill(0));
            score = 0;
            gameOver = false;
            document.getElementById('gameOver').classList.remove('show');
            addRandomTile();
            addRandomTile();
            render();
        }

        function addRandomTile() {
            const empty = [];
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (grid[r][c] === 0) empty.push({r, c});
                }
            }
            if (empty.length === 0) return;
            const {r, c} = empty[Math.floor(Math.random() * empty.length)];
            grid[r][c] = Math.random() < 0.9 ? 2 : 4;
        }

        function render() {
            const gridEl = document.getElementById('grid');
            gridEl.innerHTML = '';
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    const val = grid[r][c];
                    if (val > 0) {
                        cell.textContent = val;
                        cell.dataset.value = val;
                    }
                    gridEl.appendChild(cell);
                }
            }
            document.getElementById('score').textContent = score;
        }

        function slide(row) {
            const filtered = row.filter(v => v !== 0);
            const merged = [];
            let i = 0;
            while (i < filtered.length) {
                if (i + 1 < filtered.length && filtered[i] === filtered[i + 1]) {
                    merged.push(filtered[i] * 2);
                    score += filtered[i] * 2;
                    i += 2;
                } else {
                    merged.push(filtered[i]);
                    i++;
                }
            }
            while (merged.length < size) merged.push(0);
            return merged;
        }

        function move(direction) {
            if (gameOver) return;
            let moved = false;
            
            if (direction === 'left') {
                for (let r = 0; r < size; r++) {
                    const newRow = slide(grid[r]);
                    if (newRow.join() !== grid[r].join()) moved = true;
                    grid[r] = newRow;
                }
            } else if (direction === 'right') {
                for (let r = 0; r < size; r++) {
                    const reversed = [...grid[r]].reverse();
                    const newRow = slide(reversed).reverse();
                    if (newRow.join() !== grid[r].join()) moved = true;
                    grid[r] = newRow;
                }
            } else if (direction === 'up') {
                for (let c = 0; c < size; c++) {
                    const col = grid.map(row => row[c]);
                    const newCol = slide(col);
                    if (newCol.join() !== col.join()) moved = true;
                    for (let r = 0; r < size; r++) grid[r][c] = newCol[r];
                }
            } else if (direction === 'down') {
                for (let c = 0; c < size; c++) {
                    const col = grid.map(row => row[c]).reverse();
                    const newCol = slide(col).reverse();
                    if (newCol.join() !== grid.map(row => row[c]).join()) moved = true;
                    for (let r = 0; r < size; r++) grid[r][c] = newCol[r];
                }
            }

            if (moved) {
                addRandomTile();
                render();
                checkGameOver();
            }
        }

        function checkGameOver() {
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (grid[r][c] === 0) return;
                    if (c < size - 1 && grid[r][c] === grid[r][c + 1]) return;
                    if (r < size - 1 && grid[r][c] === grid[r + 1][c]) return;
                }
            }
            gameOver = true;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').classList.add('show');
        }

        document.addEventListener('keydown', (e) => {
            const map = {
                'ArrowLeft': 'left', 'ArrowRight': 'right',
                'ArrowUp': 'up', 'ArrowDown': 'down',
                'a': 'left', 'd': 'right', 'w': 'up', 's': 'down'
            };
            const dir = map[e.key];
            if (dir) { e.preventDefault(); move(dir); }
        });

        let touchStartX = 0, touchStartY = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        document.addEventListener('touchmove', (e) => e.preventDefault());
        document.addEventListener('touchend', (e) => {
            if (touchStartX === 0 && touchStartY === 0) return;
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
            if (Math.abs(dx) > Math.abs(dy)) {
                move(dx > 0 ? 'right' : 'left');
            } else {
                move(dy > 0 ? 'down' : 'up');
            }
            touchStartX = 0; touchStartY = 0;
        });

        initGame();
    </script>
