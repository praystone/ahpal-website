<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>射擊靶場 - 瞄準挑戰 - 雅寶遊戲間</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #1a202c;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
                /* ============================================================
           頁首樣式（與首頁一致）
           ============================================================ */
        .site-header {
            background: #005A9C;
            color: white;
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 2px 8px rgba(0,0,0,0.10);
            width: 100%;
        }
        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo {
            font-size: 20px;
            font-weight: 700;
            color: white;
            text-decoration: none;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .logo:hover { color: rgba(255,255,255,0.85); }
        .nav-links {
            display: flex;
            gap: 20px;
            font-size: 14px;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            transition: color 0.2s;
        }
        .nav-links a:hover {
            color: white;
            border-bottom: 2px solid #00A86B;
        }
        .nav-links .game-link {
            background: rgba(255,255,255,0.15);
            padding: 4px 14px;
            border-radius: 20px;
            font-weight: 500;
        }
        .nav-links .game-link:hover {
            border-bottom: none;
            background: rgba(255,255,255,0.25);
        }
                /* ============================================================
           頁尾樣式（與首頁一致）
           ============================================================ */
        .site-footer {
            background: #2D3748;
            color: #A0AEC0;
            padding: 40px 0 28px 0;
            margin-top: 40px;
            font-size: 14px;
            width: 100%;
        }
        .footer-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            text-align: center;
        }
        .footer-inner .copy {
            font-size: 13px;
            color: #718096;
        }
        .footer-inner .declaration {
            font-size: 12px;
            color: #FF6F61;
            letter-spacing: 1px;
            font-weight: 300;
            margin-top: 4px;
        }
        .footer-inner a {
            color: #A0AEC0;
            text-decoration: none;
        }
        .footer-inner a:hover {
            color: white;
            text-decoration: underline;
        }
        .game-container {
            background: #2d3748;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.4);
            max-width: 500px;
            width: 100%;
            text-align: center;
            margin: 20px 0;
        }
        h1 { color: white; margin-bottom: 4px; font-size: 28px; }
        .desc { color: #a0aec0; font-size: 14px; margin-bottom: 16px; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            color: white;
        }
        .header .info {
            background: #1a202c;
            padding: 4px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
        }
        canvas {
            background: #1a202c;
            border-radius: 12px;
            display: block;
            margin: 0 auto;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 400 / 400;
            cursor: crosshair;
        }
        .controls {
            margin-top: 16px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .controls button {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: #48bb78;
            color: white;
        }
        .controls button:hover { background: #38a169; transform: scale(1.02); }
        .message {
            margin-top: 12px;
            font-size: 14px;
            color: #a0aec0;
        }
        @media (max-width: 480px) { h1 { font-size: 22px; } }
    </style>
</head>
<body>
        <header class="site-header">
        <div class="header-inner">
            <a href="/" class="logo">雅寶社區 · 頂客論壇</a>
            <nav class="nav-links">
                <a href="/">首頁</a>
                <a href="/memorial.html">歲月迴聲</a>
                <a href="/royal_dragon_karma.html">公義史錄</a>
                <a href="/categories.html">📚 全部分類</a>
                <a href="/game/" class="game-link">🎮 遊戲間</a>
            </nav>
        </div>
    </header>
    <div class="game-container">
        <h1>🎯 射擊靶場 - 瞄準挑戰</h1>
        <p class="desc">瞄準靶心，考驗你的射擊精準度！</p>
        <div class="header">
            <span class="info">🎯 分數 <span id="score">0</span></span>
            <span class="info">💨 剩餘 <span id="shots">10</span></span>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="controls">
            <button onclick="initGame()">🔄 新遊戲</button>
        </div>
        <div class="message" id="message">點擊靶心射擊！</div>
    </div>
        <footer class="site-footer">
        <div class="footer-inner">
            <div class="copy">&copy; 2026 雅寶社區 · 頂客論壇 (AHPAL.COM) — 版權所有</div>
            <div style="margin-top:6px;font-size:13px;">
                <a href="/sitemap.xml" style="color:#A0AEC0;text-decoration:none;margin:0 12px;">📄 Sitemap</a>
                <a href="/categories.html" style="color:#A0AEC0;text-decoration:none;margin:0 12px;">📚 全部分類</a>
                <a href="/game/" style="color:#A0AEC0;text-decoration:none;margin:0 12px;">🎮 遊戲間</a>
            </div>
            <div class="declaration">「從社區法治，走向知識共創」</div>
        </div>
    </footer>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = 400, H = 400;
        let targets = [];
        let score = 0;
        let shots = 10;
        let gameRunning = true;
        let animationId = null;

        function initGame() {
            if (animationId) cancelAnimationFrame(animationId);
            targets = [];
            score = 0;
            shots = 10;
            gameRunning = true;
            document.getElementById('score').textContent = score;
            document.getElementById('shots').textContent = shots;
            document.getElementById('message').textContent = '點擊靶心射擊！';
            spawnTarget();
            gameLoop();
        }

        function spawnTarget() {
            if (targets.length >= 3) return;
            targets.push({
                x: 60 + Math.random() * 280,
                y: 60 + Math.random() * 280,
                r: 20 + Math.random() * 15,
                dx: (Math.random() - 0.5) * 2,
                dy: (Math.random() - 0.5) * 2,
                alive: true
            });
        }

        function gameLoop() {
            if (!gameRunning) return;
            update();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }

        function update() {
            for (const t of targets) {
                if (!t.alive) continue;
                t.x += t.dx;
                t.y += t.dy;
                if (t.x - t.r < 0 || t.x + t.r > W) t.dx *= -1;
                if (t.y - t.r < 0 || t.y + t.r > H) t.dy *= -1;
            }
            if (targets.filter(t => t.alive).length < 2 && Math.random() < 0.02) {
                spawnTarget();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);
            for (const t of targets) {
                if (!t.alive) continue;
                const rings = [t.r, t.r*0.75, t.r*0.5, t.r*0.25];
                const colors = ['#fc8181', '#f6ad55', '#f6e05e', '#fc8181'];
                for (let i = 0; i < rings.length; i++) {
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, rings[i], 0, Math.PI * 2);
                    ctx.fillStyle = colors[i % colors.length];
                    ctx.fill();
                    ctx.strokeStyle = '#1a202c';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
                ctx.fillStyle = '#e53e3e';
                ctx.beginPath();
                ctx.arc(t.x, t.y, 4, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        canvas.addEventListener('click', (e) => {
            if (!gameRunning || shots <= 0) return;
            const rect = canvas.getBoundingClientRect();
            const scale = canvas.width / rect.width;
            const mx = (e.clientX - rect.left) * scale;
            const my = (e.clientY - rect.top) * scale;
            
            let hit = false;
            for (const t of targets) {
                if (!t.alive) continue;
                const dist = Math.sqrt((mx - t.x) ** 2 + (my - t.y) ** 2);
                if (dist <= t.r) {
                    t.alive = false;
                    hit = true;
                    const points = Math.floor((1 - dist / t.r) * 10) + 5;
                    score += points;
                    document.getElementById('score').textContent = score;
                    document.getElementById('message').textContent = 🎯 命中！+ 分！;
                    break;
                }
            }
            if (!hit) {
                document.getElementById('message').textContent = '❌ 沒打中，再試一次！';
            }
            
            shots--;
            document.getElementById('shots').textContent = shots;
            
            if (shots <= 0) {
                gameRunning = false;
                if (animationId) cancelAnimationFrame(animationId);
                document.getElementById('message').textContent = 🏁 遊戲結束！總分： 分！;
            }
        });

        initGame();
    </script>
</body>
</html>
