<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>井字遊戲 - 經典對戰 - 雅寶遊戲間</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #f0f4f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
                /* ============================================================
           頁首樣式（與首頁一致）
           ============================================================ */
        .site-header {
            background: #005A9C;
            color: white;
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 2px 8px rgba(0,0,0,0.10);
            width: 100%;
        }
        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo {
            font-size: 20px;
            font-weight: 700;
            color: white;
            text-decoration: none;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .logo:hover { color: rgba(255,255,255,0.85); }
        .nav-links {
            display: flex;
            gap: 20px;
            font-size: 14px;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            transition: color 0.2s;
        }
        .nav-links a:hover {
            color: white;
            border-bottom: 2px solid #00A86B;
        }
        .nav-links .game-link {
            background: rgba(255,255,255,0.15);
            padding: 4px 14px;
            border-radius: 20px;
            font-weight: 500;
        }
        .nav-links .game-link:hover {
            border-bottom: none;
            background: rgba(255,255,255,0.25);
        }
                /* ============================================================
           頁尾樣式（與首頁一致）
           ============================================================ */
        .site-footer {
            background: #2D3748;
            color: #A0AEC0;
            padding: 40px 0 28px 0;
            margin-top: 40px;
            font-size: 14px;
            width: 100%;
        }
        .footer-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            text-align: center;
        }
        .footer-inner .copy {
            font-size: 13px;
            color: #718096;
        }
        .footer-inner .declaration {
            font-size: 12px;
            color: #FF6F61;
            letter-spacing: 1px;
            font-weight: 300;
            margin-top: 4px;
        }
        .footer-inner a {
            color: #A0AEC0;
            text-decoration: none;
        }
        .footer-inner a:hover {
            color: white;
            text-decoration: underline;
        }
        .game-container {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
            margin: 20px 0;
        }
        h1 { color: #2d3748; margin-bottom: 4px; font-size: 28px; }
        .desc { color: #718096; font-size: 14px; margin-bottom: 16px; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .header .info {
            background: #edf2f7;
            padding: 4px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            max-width: 360px;
            margin: 0 auto;
            aspect-ratio: 1;
        }
        .cell {
            background: #e2e8f0;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 56px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            color: #2d3748;
        }
        .cell:hover { background: #cbd5e0; }
        .cell.x { color: #005A9C; }
        .cell.o { color: #e53e3e; }
        .cell.win { background: #c6f6d5; }
        .cell:disabled { cursor: not-allowed; opacity: 0.8; }
        .controls {
            margin-top: 16px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .controls button {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: #005A9C;
            color: white;
        }
        .controls button:hover { background: #003d66; transform: scale(1.02); }
        .message {
            margin-top: 12px;
            font-size: 14px;
            color: #4a5568;
        }
        .message.win { color: #38a169; font-weight: 700; }
        .message.lose { color: #e53e3e; font-weight: 700; }
        @media (max-width: 480px) { .cell { font-size: 40px; } h1 { font-size: 22px; } }
    </style>
</head>
<body>
        <header class="site-header">
        <div class="header-inner">
            <a href="/" class="logo">雅寶社區 · 頂客論壇</a>
            <nav class="nav-links">
                <a href="/">首頁</a>
                <a href="/memorial.html">歲月迴聲</a>
                <a href="/royal_dragon_karma.html">公義史錄</a>
                <a href="/categories.html">📚 全部分類</a>
                <a href="/game/" class="game-link">🎮 遊戲間</a>
            </nav>
        </div>
    </header>
    <div class="game-container">
        <h1>❌ 井字遊戲 - 經典對戰</h1>
        <p class="desc">與 AI 對戰井字遊戲，考驗你的策略思維！</p>
        <div class="header">
            <span class="info">❌ 玩家 <span id="playerScore">0</span></span>
            <span class="info">⚖️ 平手 <span id="drawScore">0</span></span>
            <span class="info">⭕ AI <span id="aiScore">0</span></span>
        </div>
        <div class="board" id="board"></div>
        <div class="controls">
            <button onclick="initGame()">🔄 新遊戲</button>
        </div>
        <div class="message" id="message">點擊格子開始遊戲！</div>
    </div>
        <footer class="site-footer">
        <div class="footer-inner">
            <div class="copy">&copy; 2026 雅寶社區 · 頂客論壇 (AHPAL.COM) — 版權所有</div>
            <div style="margin-top:6px;font-size:13px;">
                <a href="/sitemap.xml" style="color:#A0AEC0;text-decoration:none;margin:0 12px;">📄 Sitemap</a>
                <a href="/categories.html" style="color:#A0AEC0;text-decoration:none;margin:0 12px;">📚 全部分類</a>
                <a href="/game/" style="color:#A0AEC0;text-decoration:none;margin:0 12px;">🎮 遊戲間</a>
            </div>
            <div class="declaration">「從社區法治，走向知識共創」</div>
        </div>
    </footer>
    <script>
        var board = [];
        var currentPlayer = 'X';
        var gameActive = true;
        var playerScore = 0;
        var aiScore = 0;
        var drawScore = 0;

        function initGame() {
            board = Array(9).fill(null);
            currentPlayer = 'X';
            gameActive = true;
            document.getElementById('message').textContent = '輪到你！';
            document.getElementById('message').className = 'message';
            render();
        }

        function render() {
            var boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            for (var i = 0; i < 9; i++) {
                var cell = document.createElement('div');
                cell.className = 'cell';
                if (board[i] === 'X') cell.classList.add('x');
                if (board[i] === 'O') cell.classList.add('o');
                cell.textContent = board[i] || '';
                cell.dataset.index = i;
                cell.addEventListener('click', function() { handleClick(parseInt(this.dataset.index)); });
                boardEl.appendChild(cell);
            }
        }

        function handleClick(index) {
            if (!gameActive || currentPlayer !== 'X' || board[index] !== null) return;
            board[index] = 'X';
            render();
            if (checkWin('X')) {
                gameActive = false;
                playerScore++;
                document.getElementById('playerScore').textContent = playerScore;
                document.getElementById('message').textContent = '🎉 你贏了！太棒了！';
                document.getElementById('message').className = 'message win';
                highlightWin();
                return;
            }
            if (board.every(c => c !== null)) {
                gameActive = false;
                drawScore++;
                document.getElementById('drawScore').textContent = drawScore;
                document.getElementById('message').textContent = '⚖️ 平手！';
                document.getElementById('message').className = 'message';
                return;
            }
            currentPlayer = 'O';
            document.getElementById('message').textContent = 'AI 思考中...';
            setTimeout(aiMove, 400);
        }

        function aiMove() {
            if (!gameActive) return;
            var bestScore = -Infinity;
            var bestMove = null;
            for (var i = 0; i < 9; i++) {
                if (board[i] !== null) continue;
                board[i] = 'O';
                var score = minimax(board, 0, false);
                board[i] = null;
                if (score > bestScore) {
                    bestScore = score;
                    bestMove = i;
                }
            }
            if (bestMove !== null) {
                board[bestMove] = 'O';
                render();
                if (checkWin('O')) {
                    gameActive = false;
                    aiScore++;
                    document.getElementById('aiScore').textContent = aiScore;
                    document.getElementById('message').textContent = '💀 AI 贏了！再試一次！';
                    document.getElementById('message').className = 'message lose';
                    highlightWin();
                    return;
                }
                if (board.every(c => c !== null)) {
                    gameActive = false;
                    drawScore++;
                    document.getElementById('drawScore').textContent = drawScore;
                    document.getElementById('message').textContent = '⚖️ 平手！';
                    document.getElementById('message').className = 'message';
                    return;
                }
                currentPlayer = 'X';
                document.getElementById('message').textContent = '輪到你！';
            }
        }

        function minimax(board, depth, isMaximizing) {
            if (checkWin('O')) return 10 - depth;
            if (checkWin('X')) return depth - 10;
            if (board.every(c => c !== null)) return 0;
            if (isMaximizing) {
                var best = -Infinity;
                for (var i = 0; i < 9; i++) {
                    if (board[i] !== null) continue;
                    board[i] = 'O';
                    best = Math.max(best, minimax(board, depth + 1, false));
                    board[i] = null;
                }
                return best;
            } else {
                var best = Infinity;
                for (var i = 0; i < 9; i++) {
                    if (board[i] !== null) continue;
                    board[i] = 'X';
                    best = Math.min(best, minimax(board, depth + 1, true));
                    board[i] = null;
                }
                return best;
            }
        }

        function checkWin(player) {
            var winPatterns = [
                [0,1,2],[3,4,5],[6,7,8],
                [0,3,6],[1,4,7],[2,5,8],
                [0,4,8],[2,4,6]
            ];
            for (var i = 0; i < winPatterns.length; i++) {
                var [a,b,c] = winPatterns[i];
                if (board[a] === player && board[b] === player && board[c] === player) {
                    return true;
                }
            }
            return false;
        }

        function highlightWin() {
            var winPatterns = [
                [0,1,2],[3,4,5],[6,7,8],
                [0,3,6],[1,4,7],[2,5,8],
                [0,4,8],[2,4,6]
            ];
            var cells = document.querySelectorAll('.cell');
            for (var i = 0; i < winPatterns.length; i++) {
                var [a,b,c] = winPatterns[i];
                if (board[a] && board[a] === board[b] && board[b] === board[c]) {
                    cells[a].classList.add('win');
                    cells[b].classList.add('win');
                    cells[c].classList.add('win');
                    return;
                }
            }
        }

        initGame();
    </script>
</body>
</html>
