<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>踩地雷 - 雅寶遊戲間</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft JhengHei", sans-serif; background: #fcfaf2; color: #1c1c1c; min-height: 100vh; }
        .game-nav { background: #005A9C; color: white; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; position: sticky; top: 0; z-index: 50; }
        .game-nav .logo { font-size: 20px; font-weight: 700; color: white; text-decoration: none; }
        .game-nav .nav-links { display: flex; gap: 20px; font-size: 14px; align-items: center; }
        .game-nav .nav-links a { color: rgba(255,255,255,0.85); text-decoration: none; }
        .game-nav .nav-links a:hover { color: white; }
        .game-nav .nav-links .back-btn { background: rgba(255,255,255,0.15); padding: 6px 16px; border-radius: 20px; font-weight: 500; }
        .game-nav .nav-links .back-btn:hover { background: rgba(255,255,255,0.25); }
        .game-wrapper { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        .game-container { background: white; border-radius: 16px; padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); border: 1px solid #e6ded1; }
        .game-header { text-align: center; margin-bottom: 24px; }
        .game-header h1 { font-size: 28px; color: #005A9C; }
        .game-header .subtitle { color: #888; font-size: 14px; }
        .game-area { background: #f7f9fc; border-radius: 12px; padding: 20px; border: 1px solid #e6ded1; text-align: center; }
        .game-area .info { display: flex; justify-content: space-between; margin-bottom: 16px; font-size: 16px; font-weight: bold; color: #005A9C; }
        .game-area .grid { display: grid; gap: 2px; margin: 0 auto; }
        .game-area .cell { width: 36px; height: 36px; background: #005A9C; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.15s; }
        .game-area .cell:hover { background: #003d66; }
        .game-area .cell.revealed { background: #e2e8f0; color: #1a202c; cursor: default; }
        .game-area .cell.revealed:hover { background: #e2e8f0; }
        .game-area .cell.mine-exploded { background: #e53e3e; }
        .game-area .controls { margin-top: 16px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .game-area .controls button { padding: 10px 24px; background: #005A9C; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .game-area .controls button:hover { background: #003d66; }
        .game-info { margin-top: 30px; padding: 24px; background: #f7f9fc; border-radius: 12px; border: 1px solid #e6ded1; }
        .game-info h2 { font-size: 18px; color: #005A9C; margin-bottom: 12px; }
        .game-info p { color: #555; font-size: 15px; line-height: 1.8; }
        .game-info .how-to-play { background: white; padding: 16px 20px; border-radius: 8px; margin-top: 12px; border-left: 4px solid #00A86B; }
        .game-info .how-to-play strong { color: #005A9C; }
        .game-footer { text-align: center; padding: 30px 0 20px; color: #999; font-size: 13px; border-top: 1px solid #e6ded1; margin-top: 40px; }
        .game-footer a { color: #005A9C; text-decoration: none; }
        #back-to-top { position: fixed; bottom: 30px; right: 30px; background: #005A9C; color: white; border: none; padding: 12px 16px; border-radius: 50px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); opacity: 0.7; z-index: 999; transition: all 0.3s; }
        #back-to-top:hover { opacity: 1; transform: scale(1.05); background: #003d66; }
        @media (max-width: 600px) { .game-area .cell { width: 28px; height: 28px; font-size: 12px; } .game-container { padding: 16px; } }
    </style>
</head>
<body>
    <nav class="game-nav"><a href="/" class="logo">⚖️ 雅寶社區 · 頂客論壇</a><div class="nav-links"><a href="/">首頁</a><a href="/game/" class="back-btn">🎮 返回遊戲間</a></div></nav>
    <div class="game-wrapper">
        <div class="game-container">
            <div class="game-header"><h1>💣 踩地雷</h1><p class="subtitle">經典推理遊戲，找出所有地雷！</p></div>
            <div class="game-area">
                <div class="info"><span>💣 地雷：<span id="mineCount">10</span></span><span>🚩 旗子：<span id="flagCount">0</span></span></div>
                <div id="mineGrid" class="grid" style="grid-template-columns: repeat(9, 36px);"></div>
                <div class="controls"><button onclick="initGame()">🔄 新遊戲</button></div>
            </div>
            <div class="game-info">
                <h2>🎯 如何玩踩地雷？</h2>
                <div class="how-to-play">
                    <p><strong>🎮 遊戲目標：</strong>找出所有地雷的位置，不要點到地雷！</p>
                    <p><strong>🖱️ 操作方法：</strong>左鍵點擊揭開方塊，右鍵點擊標記旗子。</p>
                    <p><strong>💡 小技巧：</strong>數字代表周圍 8 格中有幾顆地雷，用來推理安全區域。</p>
                </div>
            </div>
        </div>
    </div>
    <footer class="game-footer"><p>&copy; 2026 <a href="/">雅寶社區 · 頂客論壇 (AHPAL.COM)</a> — 遊戲間</p></footer>
    <button id="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">⬆ TOP</button>
    <script>
        const rows=9, cols=9, totalMines=10; let grid=[], gameOver=false, firstClick=true, flagCount=0;
        function initGame() { grid=[]; gameOver=false; firstClick=true; flagCount=0; document.getElementById('flagCount').textContent='0'; for(let r=0;r<rows;r++){grid[r]=[];for(let c=0;c<cols;c++)grid[r][c]={mine:false,revealed:false,flagged:false,count:0};} renderGrid(); }
        function placeMines(excludeR, excludeC){let placed=0;while(placed<totalMines){let r=Math.floor(Math.random()*rows), c=Math.floor(Math.random()*cols); if((r===excludeR&&c===excludeC)||grid[r][c].mine) continue; grid[r][c].mine=true; placed++;} for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){if(grid[r][c].mine)continue; let cnt=0; for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){let nr=r+dr,nc=c+dc; if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&grid[nr][nc].mine)cnt++;} grid[r][c].count=cnt;} }
        function renderGrid(){const container=document.getElementById('mineGrid'); container.innerHTML=''; for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){const cell=document.createElement('button'); cell.className='cell'; cell.dataset.row=r; cell.dataset.col=c; cell.addEventListener('click',()=>handleClick(r,c)); cell.addEventListener('contextmenu',(e)=>{e.preventDefault();handleRightClick(r,c);}); container.appendChild(cell);} updateMineCount(); }
        function getCell(r,c){return document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);}
        function handleClick(r,c){if(gameOver||grid[r][c].flagged)return; if(firstClick){placeMines(r,c); firstClick=false;} if(grid[r][c].revealed)return; if(grid[r][c].mine){grid[r][c].revealed=true; const cell=getCell(r,c); cell.classList.add('revealed','mine-exploded'); cell.textContent='💥'; gameOver=true; revealAllMines(); return;} revealCell(r,c); checkWin(); }
        function handleRightClick(r,c){if(gameOver||grid[r][c].revealed)return; const cell=getCell(r,c); if(grid[r][c].flagged){grid[r][c].flagged=false; flagCount--; cell.textContent=''; cell.classList.remove('revealed');}else{grid[r][c].flagged=true; flagCount++; cell.textContent='🚩'; cell.classList.add('revealed');} document.getElementById('flagCount').textContent=flagCount; }
        function revealCell(r,c){if(r<0||r>=rows||c<0||c>=cols||grid[r][c].revealed||grid[r][c].flagged)return; grid[r][c].revealed=true; const cell=getCell(r,c); cell.classList.add('revealed'); if(grid[r][c].mine)return; if(grid[r][c].count===0){cell.textContent=''; for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){if(dr===0&&dc===0)continue; revealCell(r+dr,c+dc);}}else cell.textContent=grid[r][c].count; }
        function revealAllMines(){for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){if(grid[r][c].mine){const cell=getCell(r,c); cell.textContent='💣'; cell.classList.add('revealed');}}}
        function checkWin(){let safe=0; for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(!grid[r][c].mine&&grid[r][c].revealed)safe++; if(safe===rows*cols-totalMines){gameOver=true; alert('🎉 恭喜你贏了！所有地雷都找到了！');}}
        function updateMineCount(){document.getElementById('mineCount').textContent=totalMines;}
        initGame();
    </script>
<p style="text-align:center; margin:20px 0;"><a href="/" style="color:#005A9C; font-weight:500;">🏠 返回首頁</a></p></body>
</html>
