<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跑酷 - 雅寶遊戲間</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8637791667872348" crossorigin="anonymous"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft JhengHei", sans-serif; background: #fcfaf2; color: #1c1c1c; min-height: 100vh; }
        .game-nav { background: #005A9C; color: white; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; position: sticky; top: 0; z-index: 50; }
        .game-nav .logo { font-size: 20px; font-weight: 700; color: white; text-decoration: none; }
        .game-nav .nav-links { display: flex; gap: 20px; font-size: 14px; align-items: center; }
        .game-nav .nav-links a { color: rgba(255,255,255,0.85); text-decoration: none; }
        .game-nav .nav-links .back-btn { background: rgba(255,255,255,0.15); padding: 6px 16px; border-radius: 20px; font-weight: 500; }
        .game-wrapper { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        .game-container { background: white; border-radius: 16px; padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); border: 1px solid #e6ded1; }
        .game-header { text-align: center; margin-bottom: 24px; }
        .game-header h1 { font-size: 28px; color: #005A9C; }
        .game-header .subtitle { color: #888; font-size: 14px; }
        .game-area { background: #f7f9fc; border-radius: 12px; padding: 20px; border: 1px solid #e6ded1; text-align: center; }
        .game-area .info { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 16px; font-weight: bold; color: #005A9C; }
        .game-area canvas { display: block; margin: 0 auto; background: #87CEEB; border-radius: 8px; width: 100%; max-width: 600px; height: auto; aspect-ratio: 2/1; }
        .game-area .controls { margin-top: 16px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .game-area .controls button { padding: 10px 24px; background: #005A9C; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .game-area .controls button:hover { background: #003d66; }
        .game-area .message { margin-top: 12px; font-size: 16px; font-weight: bold; color: #005A9C; }
        .game-info { margin-top: 30px; padding: 24px; background: #f7f9fc; border-radius: 12px; border: 1px solid #e6ded1; }
        .game-info h2 { font-size: 18px; color: #005A9C; margin-bottom: 12px; }
        .game-info .how-to-play { background: white; padding: 16px 20px; border-radius: 8px; margin-top: 12px; border-left: 4px solid #00A86B; }
        .game-info .how-to-play strong { color: #005A9C; }
        .game-footer { text-align: center; padding: 30px 0 20px; color: #999; font-size: 13px; border-top: 1px solid #e6ded1; margin-top: 40px; }
        #back-to-top { position: fixed; bottom: 30px; right: 30px; background: #005A9C; color: white; border: none; padding: 12px 16px; border-radius: 50px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); opacity: 0.7; z-index: 999; transition: all 0.3s; }
        #back-to-top:hover { opacity: 1; transform: scale(1.05); background: #003d66; }
    </style>
</head>
<body>
    <nav class="game-nav"><a href="/" class="logo">⚖️ 雅寶社區 · 頂客論壇</a><div class="nav-links"><a href="/">首頁</a><a href="/game/" class="back-btn">🎮 返回遊戲間</a></div></nav>
    <div class="game-wrapper">
        <div class="game-container">
            <div class="game-header"><h1>🏃 跑酷</h1><p class="subtitle">跳躍閃避障礙物，跑得越遠越好！</p></div>
            <div class="game-area">
                <div class="info"><span>🏃 距離：<span id="score">0</span>m</span><span>💀 障礙物：<span id="obstacleCount">0</span></span></div>
                <canvas id="gameCanvas" width="600" height="300"></canvas>
                <div id="message" class="message"></div>
                <div class="controls"><button onclick="initGame()">🔄 新遊戲</button></div>
            </div>
            <div class="game-info">
                <h2>🎯 如何玩跑酷？</h2>
                <div class="how-to-play">
                    <p><strong>🎮 遊戲目標：</strong>控制角色跳躍閃避障礙物，跑得越遠越好！</p>
                    <p><strong>⌨️ 操作方法：</strong>按 <strong>空白鍵</strong> 或 <strong>↑</strong> 或 <strong>點擊畫面</strong> 讓角色跳躍。</p>
                    <p><strong>💡 小技巧：</strong>適時跳躍，不要連續跳，保持節奏！</p>
                </div>
            </div>
        </div>
    </div>
    <footer class="game-footer"><p>&copy; 2026 <a href="/">雅寶社區 · 頂客論壇 (AHPAL.COM)</a> — 遊戲間</p></footer>
    <button id="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">⬆ TOP</button>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let score = 0, obstacleCount = 0, gameActive = true;
        let player = { x: 80, y: 220, width: 30, height: 30, vy: 0, gravity: 0.6, jumpPower: -12 };
        let obstacles = [];
        let frameId, spawnTimer = 0;

        function initGame() {
            score = 0;
            obstacleCount = 0;
            gameActive = true;
            player.y = 220;
            player.vy = 0;
            obstacles = [];
            document.getElementById('score').textContent = score;
            document.getElementById('obstacleCount').textContent = obstacleCount;
            document.getElementById('message').textContent = '';
            if (frameId) cancelAnimationFrame(frameId);
            gameLoop();
        }

        function jump() {
            if (!gameActive) return;
            if (player.y >= 210) {
                player.vy = player.jumpPower;
            }
        }

        function gameLoop() {
            if (!gameActive) return;
            update();
            render();
            frameId = requestAnimationFrame(gameLoop);
        }

        function update() {
            // 玩家物理
            player.vy += player.gravity;
            player.y += player.vy;
            if (player.y > 220) { player.y = 220; player.vy = 0; }

            // 生成障礙物
            spawnTimer++;
            if (spawnTimer > 60) {
                spawnTimer = 0;
                const height = 20 + Math.random() * 30;
                obstacles.push({ x: 600, y: 280 - height, width: 20, height: height });
            }

            // 移動障礙物
            obstacles.forEach(o => o.x -= 5);
            obstacles = obstacles.filter(o => o.x > -20);

            // 碰撞檢測
            obstacles.forEach(o => {
                if (player.x < o.x + o.width && player.x + player.width > o.x &&
                    player.y < o.y + o.height && player.y + player.height > o.y) {
                    gameActive = false;
                    document.getElementById('message').textContent = '💀 遊戲結束！點擊「新遊戲」重新挑戰。';
                }
            });

            // 得分
            if (obstacles.length > 0) {
                obstacles.forEach(o => {
                    if (o.x + o.width < player.x && !o.scored) {
                        o.scored = true;
                        score++;
                        document.getElementById('score').textContent = score;
                    }
                });
            }
            obstacleCount = obstacles.length;
            document.getElementById('obstacleCount').textContent = obstacleCount;
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 地面
            ctx.fillStyle = '#2d3748';
            ctx.fillRect(0, 250, canvas.width, 50);

            // 玩家
            ctx.fillStyle = '#e53e3e';
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.fillStyle = '#c53030';
            ctx.fillRect(player.x + 5, player.y - 5, 8, 8);

            // 障礙物
            obstacles.forEach(o => {
                ctx.fillStyle = '#2d3748';
                ctx.fillRect(o.x, o.y, o.width, o.height);
            });

            // 得分顯示
            ctx.fillStyle = '#1a202c';
            ctx.font = '18px Arial';
            ctx.fillText(`🏃 ${score}m`, 20, 30);
        }

        // 鍵盤事件
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'ArrowUp') {
                e.preventDefault();
                jump();
            }
        });

        // 點擊事件
        canvas.addEventListener('click', jump);

        initGame();
    </script>
<p style="text-align:center; margin:20px 0;"><a href="/" style="color:#005A9C; font-weight:500;">🏠 返回首頁</a></p></body>
</html>
