<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">

    <title>拼圖挑戰 - 完成圖片 - 雅寶遊戲間</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #f0f4f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
                /* ============================================================
           頁首樣式（與首頁一致）
           ============================================================ */
        .site-header {
            background: #005A9C;
            color: white;
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 2px 8px rgba(0,0,0,0.10);
            width: 100%;
        }
        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo {
            font-size: 20px;
            font-weight: 700;
            color: white;
            text-decoration: none;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .logo:hover { color: rgba(255,255,255,0.85); }
        .nav-links {
            display: flex;
            gap: 20px;
            font-size: 14px;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            transition: color 0.2s;
        }
        .nav-links a:hover {
            color: white;
            border-bottom: 2px solid #00A86B;
        }
        .nav-links .game-link {
            background: rgba(255,255,255,0.15);
            padding: 4px 14px;
            border-radius: 20px;
            font-weight: 500;
        }
        .nav-links .game-link:hover {
            border-bottom: none;
            background: rgba(255,255,255,0.25);
        }
                /* ============================================================
           頁尾樣式（與首頁一致）
           ============================================================ */
        .site-footer {
            background: #2D3748;
            color: #A0AEC0;
            padding: 40px 0 28px 0;
            margin-top: 40px;
            font-size: 14px;
            width: 100%;
        }
        .footer-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            text-align: center;
        }
        .footer-inner .copy {
            font-size: 13px;
            color: #718096;
        }
        .footer-inner .declaration {
            font-size: 12px;
            color: #FF6F61;
            letter-spacing: 1px;
            font-weight: 300;
            margin-top: 4px;
        }
        .footer-inner a {
            color: #A0AEC0;
            text-decoration: none;
        }
        .footer-inner a:hover {
            color: white;
            text-decoration: underline;
        }
        .game-container {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.1);
            max-width: 550px;
            width: 100%;
            text-align: center;
            margin: 20px 0;
        }
        h1 { color: #2d3748; margin-bottom: 4px; font-size: 28px; }
        .desc { color: #718096; font-size: 14px; margin-bottom: 16px; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .header .info {
            background: #edf2f7;
            padding: 4px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
        }
        .puzzle-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            max-width: 400px;
            margin: 0 auto;
            aspect-ratio: 1;
        }
        .puzzle-piece {
            aspect-ratio: 1;
            background: #e2e8f0;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 700;
            color: #4a5568;
            border: 2px solid #cbd5e0;
        }
        .puzzle-piece:hover { transform: scale(1.03); }
        .puzzle-piece.empty {
            background: transparent;
            border: 2px dashed #cbd5e0;
            cursor: default;
        }
        .puzzle-piece.empty:hover { transform: none; }
        .controls {
            margin-top: 16px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .controls button {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: #005A9C;
            color: white;
        }
        .controls button:hover { background: #003d66; transform: scale(1.02); }
        .message {
            margin-top: 12px;
            font-size: 14px;
            color: #4a5568;
        }
        .message.win { color: #38a169; font-weight: 700; }
        @media (max-width: 480px) {
            h1 { font-size: 22px; }
            .puzzle-piece { font-size: 18px; }
        }
    </style>
</head>
<body>
        <header class="site-header">
        <div class="header-inner">
            <a href="/" class="logo">雅寶社區 · 頂客論壇</a>
            <nav class="nav-links">
                <a href="/">首頁</a>
                <a href="/memorial.html">歲月迴聲</a>
                <a href="/royal_dragon_karma.html">公義史錄</a>
                <a href="/categories.html">📚 全部分類</a>
                <a href="/game/" class="game-link">🎮 遊戲間</a>
            </nav>
        </div>
    </header>
    <div class="game-container">
        <h1>拼圖挑戰 - 完成圖片</h1>
        <p class="desc">拖曳拼塊，完成美麗的圖片！</p>
        <div class="header">
            <span class="info">👆 步數 <span id="moves">0</span></span>
            <span class="info">⏱️ 時間 <span id="timer">0</span>s</span>
        </div>
        <div class="puzzle-grid" id="puzzleGrid"></div>
        <div class="controls">
            <button onclick="initGame()">🔄 新遊戲</button>
        </div>
        <div class="message" id="message">點擊相鄰拼塊移動</div>
    </div>
        <footer class="site-footer">
        <div class="footer-inner">
            <div class="copy">&copy; 2026 雅寶社區 · 頂客論壇 (AHPAL.COM) — 版權所有</div>
            <div style="margin-top:6px;font-size:13px;">
                <a href="/sitemap.xml" style="color:#A0AEC0;text-decoration:none;margin:0 12px;">📄 Sitemap</a>
                <a href="/categories.html" style="color:#A0AEC0;text-decoration:none;margin:0 12px;">📚 全部分類</a>
                <a href="/game/" style="color:#A0AEC0;text-decoration:none;margin:0 12px;">🎮 遊戲間</a>
            </div>
            <div class="declaration">「從社區法治，走向知識共創」</div>
        </div>
    </footer>
    <script>
        const SIZE = 4;
        const TOTAL = SIZE * SIZE;
        let puzzle = [];
        let emptyIndex = TOTAL - 1;
        let moves = 0;
        let timer = 0;
        let timerInterval = null;
        let gameRunning = false;

        function initGame() {
            if (timerInterval) clearInterval(timerInterval);
            timer = 0;
            moves = 0;
            gameRunning = true;
            document.getElementById('moves').textContent = moves;
            document.getElementById('timer').textContent = timer;
            document.getElementById('message').textContent = '點擊相鄰拼塊移動';
            document.getElementById('message').className = 'message';
            
            const numbers = Array.from({length: TOTAL - 1}, (_, i) => i + 1);
            numbers.push(0);
            puzzle = numbers;
            emptyIndex = TOTAL - 1;
            shuffle();
            render();
            timerInterval = setInterval(() => {
                timer++;
                document.getElementById('timer').textContent = timer;
            }, 1000);
        }

        function shuffle() {
            for (let i = 0; i < 200; i++) {
                const neighbors = getNeighbors(emptyIndex);
                const randomNeighbor = neighbors[Math.floor(Math.random() * neighbors.length)];
                swap(randomNeighbor);
            }
        }

        function getNeighbors(index) {
            const row = Math.floor(index / SIZE);
            const col = index % SIZE;
            const neighbors = [];
            if (row > 0) neighbors.push(index - SIZE);
            if (row < SIZE - 1) neighbors.push(index + SIZE);
            if (col > 0) neighbors.push(index - 1);
            if (col < SIZE - 1) neighbors.push(index + 1);
            return neighbors;
        }

        function swap(index) {
            [puzzle[index], puzzle[emptyIndex]] = [puzzle[emptyIndex], puzzle[index]];
            emptyIndex = index;
        }

        function handleClick(index) {
            if (!gameRunning) return;
            const neighbors = getNeighbors(emptyIndex);
            if (neighbors.includes(index)) {
                swap(index);
                moves++;
                document.getElementById('moves').textContent = moves;
                render();
                checkWin();
            }
        }

        function checkWin() {
            for (let i = 0; i < TOTAL; i++) {
                if (i === TOTAL - 1) {
                    if (puzzle[i] !== 0) return;
                } else if (puzzle[i] !== i + 1) return;
            }
            gameRunning = false;
            if (timerInterval) clearInterval(timerInterval);
            document.getElementById('message').textContent = '🎉 恭喜你完成拼圖！太棒了！';
            document.getElementById('message').className = 'message win';
        }

        function render() {
            const grid = document.getElementById('puzzleGrid');
            grid.innerHTML = '';
            for (let i = 0; i < TOTAL; i++) {
                const piece = document.createElement('div');
                piece.className = 'puzzle-piece';
                if (puzzle[i] === 0) {
                    piece.classList.add('empty');
                } else {
                    piece.textContent = puzzle[i];
                }
                piece.addEventListener('click', () => handleClick(i));
                grid.appendChild(piece);
            }
        }

        initGame();
    </script>
</body>
</html>
