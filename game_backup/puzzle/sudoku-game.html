<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數獨</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f0f0f0; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; max-width: 600px; width: 95%; }
        h1 { color: #005A9C; }
        table { margin: 20px auto; border-collapse: collapse; border: 3px solid #333; }
        td { width: 40px; height: 40px; text-align: center; border: 1px solid #ccc; font-size: 20px; }
        td input { width: 100%; height: 100%; border: none; text-align: center; font-size: 20px; outline: none; font-family: inherit; background: transparent; }
        td:nth-child(3n) { border-right: 3px solid #333; }
        tr:nth-child(3n) td { border-bottom: 3px solid #333; }
        button { margin: 5px; padding: 10px 20px; background: #005A9C; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        button:hover { background: #003d66; }
        .status { margin-top: 10px; color: #333; font-weight: bold; }
        .controls { margin-top: 10px; }
        @media (max-width: 500px) { td { width: 32px; height: 32px; font-size: 16px; } td input { font-size: 16px; } }
    </style>
</head>
<body><p style="font-size:14px; color:#666; text-align:center; margin:20px 0;">雅寶社區 · 頂客論壇 (AHPAL.COM)</p>
    <div class="container">
        <h1>🧩 數獨</h1>
        <div id="sudoku-grid"></div>
        <div class="controls">
            <button onclick="generatePuzzle()">新遊戲</button>
            <button onclick="checkSolution()">檢查答案</button>
        </div>
        <div id="status" class="status"></div>
    </div>
    <script>
        let grid = []; let solution = []; const size = 9;

        function generateSudoku() {
            let base = [1,2,3,4,5,6,7,8,9];
            grid = [];
            for (let i = 0; i < size; i++) {
                let row = [];
                for (let j = 0; j < size; j++) {
                    row.push(base[(i * 3 + Math.floor(i/3) + j) % size]);
                }
                grid.push(row);
            }
            for (let i = 0; i < 20; i++) {
                let r1 = Math.floor(Math.random() * size);
                let r2 = Math.floor(Math.random() * size);
                [grid[r1], grid[r2]] = [grid[r2], grid[r1]];
            }
            solution = grid.map(row => [...row]);
            for (let i = 0; i < 35; i++) {
                let r = Math.floor(Math.random() * size);
                let c = Math.floor(Math.random() * size);
                grid[r][c] = 0;
            }
            renderGrid();
            document.getElementById('status').textContent = '';
        }

        function renderGrid() {
            const container = document.getElementById('sudoku-grid');
            container.innerHTML = '';
            let table = document.createElement('table');
            for (let i = 0; i < size; i++) {
                let tr = document.createElement('tr');
                for (let j = 0; j < size; j++) {
                    let td = document.createElement('td');
                    let input = document.createElement('input');
                    input.type = 'text';
                    input.maxLength = 1;
                    input.dataset.row = i;
                    input.dataset.col = j;
                    input.id = 'cell-' + i + '-' + j;
                    input.addEventListener('input', function(e) {
                        this.value = this.value.replace(/[^1-9]/g, '');
                    });
                    if (grid[i][j] !== 0) {
                        input.value = grid[i][j];
                        input.disabled = true;
                        input.style.fontWeight = 'bold';
                    } else {
                        input.value = '';
                    }
                    td.appendChild(input);
                    tr.appendChild(td);
                }
                table.appendChild(tr);
            }
            container.appendChild(table);
        }

        function generatePuzzle() { generateSudoku(); }

        function checkSolution() {
            const inputs = document.querySelectorAll('#sudoku-grid input');
            let correct = true;
            let filled = true;
            inputs.forEach(inp => {
                let val = inp.value.trim();
                let row = parseInt(inp.dataset.row);
                let col = parseInt(inp.dataset.col);
                if (val === '') { filled = false; return; }
                if (parseInt(val) !== solution[row][col]) { correct = false; inp.style.color = 'red'; } 
                else { inp.style.color = 'green'; }
            });
            if (!filled) {
                document.getElementById('status').textContent = '⚠️ 還有空格未填！';
                return;
            }
            document.getElementById('status').textContent = correct ? '🎉 完全正確！太棒了！' : '⚠️ 有些數字不對，再試試看！';
        }

        generateSudoku();
    </script>
<style>
    #back-to-top {
        position: fixed;
        bottom: 30px;
        right: 30px;
        background: #005A9C;
        color: white;
        border: none;
        padding: 12px 16px;
        border-radius: 50px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        opacity: 0.7;
        z-index: 999;
        transition: opacity 0.3s, transform 0.3s;
    }
    #back-to-top:hover {
        opacity: 1;
        transform: scale(1.05);
        background: #003d66;
    }
</style>
<button id="back-to-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'});">⬆ TOP</button><p style="text-align:center; margin:20px 0;"><a href="/" style="color:#005A9C; font-weight:500;">🏠 返回首頁</a></p></body>
</html>
