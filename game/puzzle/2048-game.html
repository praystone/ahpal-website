<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048</title>
    <style>
        body { background: #faf8ef; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: "Arial", sans-serif; }
        .container { text-align: center; padding: 20px; width: 100%; max-width: 500px; }
        .score { margin: 16px 0; font-size: 24px; font-weight: bold; color: #776e65; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; background: #bbada0; padding: 12px; border-radius: 8px; aspect-ratio: 1; }
        .cell { background: rgba(238, 228, 218, 0.35); border-radius: 4px; display: flex; justify-content: center; align-items: center; font-size: 32px; font-weight: bold; color: #776e65; transition: all 0.1s ease; }
        .cell.has-tile { background: #eee4da; }
        .btn { margin-top: 20px; padding: 12px 32px; background: #8f7a66; color: white; border: none; border-radius: 4px; font-size: 18px; cursor: pointer; }
        .btn:hover { background: #9f8b76; }
        .status { margin-top: 12px; font-size: 18px; font-weight: bold; color: #776e65; }
        @media (max-width: 500px) { .cell { font-size: 24px; } .grid { gap: 8px; padding: 8px; } }
    </style>
</head>
<body><p style="font-size:14px; color:#666; text-align:center; margin:20px 0;">雅寶社區 · 頂客論壇 (AHPAL.COM)</p>
    <div class="container">
        <h1 style="color:#776e65;">2048</h1>
        <div class="score">分數：<span id="score">0</span></div>
        <div class="grid" id="grid"></div>
        <button class="btn" onclick="initGame()">新遊戲</button>
        <div class="status" id="status"></div>
        <p style="margin-top:20px; font-size:14px; color:#998a7e;">使用方向鍵移動，合併相同數字！</p>
    </div>
    <script>
        let grid = [];
        let score = 0;
        let gameOver = false;

        function initGame() {
            grid = Array.from({length: 4}, () => Array(4).fill(0));
            score = 0;
            gameOver = false;
            document.getElementById('status').textContent = '';
            addRandomTile();
            addRandomTile();
            render();
        }

        function addRandomTile() {
            let empty = [];
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (grid[i][j] === 0) empty.push([i, j]);
                }
            }
            if (empty.length === 0) return;
            let [r, c] = empty[Math.floor(Math.random() * empty.length)];
            grid[r][c] = Math.random() < 0.9 ? 2 : 4;
        }

        function render() {
            const gridEl = document.getElementById('grid');
            gridEl.innerHTML = '';
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    const val = grid[i][j];
                    if (val !== 0) {
                        cell.textContent = val;
                        cell.classList.add('has-tile');
                        cell.style.background = getTileColor(val);
                        cell.style.color = val > 4 ? '#f9f6f2' : '#776e65';
                        cell.style.fontSize = val > 100 ? '20px' : val > 10 ? '28px' : '32px';
                    }
                    gridEl.appendChild(cell);
                }
            }
            document.getElementById('score').textContent = score;
        }

        function getTileColor(val) {
            const colors = {
                2: '#eee4da', 4: '#ede0c8', 8: '#f2b179', 16: '#f59563',
                32: '#f67c5f', 64: '#f65e3b', 128: '#edcf72', 256: '#edcc61',
                512: '#edc850', 1024: '#edc53f', 2048: '#edc22e'
            };
            return colors[val] || '#cdc1b4';
        }

        function move(dr, dc) {
            if (gameOver) return;
            let moved = false;
            const oldGrid = grid.map(row => [...row]);

            if (dr === 0 && dc === 1) { // 右
                for (let r = 0; r < 4; r++) {
                    let row = grid[r].filter(v => v !== 0);
                    for (let i = row.length - 1; i > 0; i--) {
                        if (row[i] === row[i-1]) {
                            row[i] *= 2;
                            score += row[i];
                            row.splice(i-1, 1);
                            i--;
                        }
                    }
                    while (row.length < 4) row.unshift(0);
                    grid[r] = row;
                }
            } else if (dr === 0 && dc === -1) { // 左
                for (let r = 0; r < 4; r++) {
                    let row = grid[r].filter(v => v !== 0);
                    for (let i = 0; i < row.length - 1; i++) {
                        if (row[i] === row[i+1]) {
                            row[i] *= 2;
                            score += row[i];
                            row.splice(i+1, 1);
                            i--;
                        }
                    }
                    while (row.length < 4) row.push(0);
                    grid[r] = row;
                }
            } else if (dr === -1 && dc === 0) { // 上
                for (let c = 0; c < 4; c++) {
                    let col = [];
                    for (let r = 0; r < 4; r++) {
                        if (grid[r][c] !== 0) col.push(grid[r][c]);
                    }
                    for (let i = 0; i < col.length - 1; i++) {
                        if (col[i] === col[i+1]) {
                            col[i] *= 2;
                            score += col[i];
                            col.splice(i+1, 1);
                            i--;
                        }
                    }
                    while (col.length < 4) col.push(0);
                    for (let r = 0; r < 4; r++) grid[r][c] = col[r];
                }
            } else if (dr === 1 && dc === 0) { // 下
                for (let c = 0; c < 4; c++) {
                    let col = [];
                    for (let r = 0; r < 4; r++) {
                        if (grid[r][c] !== 0) col.push(grid[r][c]);
                    }
                    for (let i = col.length - 1; i > 0; i--) {
                        if (col[i] === col[i-1]) {
                            col[i] *= 2;
                            score += col[i];
                            col.splice(i-1, 1);
                            i--;
                        }
                    }
                    while (col.length < 4) col.unshift(0);
                    for (let r = 0; r < 4; r++) grid[r][c] = col[r];
                }
            }

            // 檢查是否移動
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (grid[r][c] !== oldGrid[r][c]) moved = true;
                }
            }

            if (moved) {
                addRandomTile();
                render();
                checkGameOver();
            }
        }

        function checkGameOver() {
            // 檢查是否有空格
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (grid[r][c] === 0) return;
                }
            }
            // 檢查是否有相鄰相同
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (r < 3 && grid[r][c] === grid[r+1][c]) return;
                    if (c < 3 && grid[r][c] === grid[r][c+1]) return;
                }
            }
            gameOver = true;
            document.getElementById('status').textContent = '💀 遊戲結束！點擊「新遊戲」重新挑戰。';
        }

        document.addEventListener('keydown', (e) => {
            const keyMap = {
                'ArrowUp': [-1, 0], 'ArrowDown': [1, 0],
                'ArrowLeft': [0, -1], 'ArrowRight': [0, 1],
                'w': [-1, 0], 's': [1, 0], 'a': [0, -1], 'd': [0, 1]
            };
            if (keyMap[e.key]) {
                e.preventDefault();
                move(keyMap[e.key][0], keyMap[e.key][1]);
            }
        });

        // 觸控支援
        let touchStartX = 0, touchStartY = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        document.addEventListener('touchend', (e) => {
            if (touchStartX === 0) return;
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(dx) > Math.abs(dy)) {
                move(0, dx > 0 ? 1 : -1);
            } else {
                move(dy > 0 ? 1 : -1, 0);
            }
            touchStartX = 0;
        });

        initGame();
    </script>
<style>
    #back-to-top {
        position: fixed;
        bottom: 30px;
        right: 30px;
        background: #005A9C;
        color: white;
        border: none;
        padding: 12px 16px;
        border-radius: 50px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        opacity: 0.7;
        z-index: 999;
        transition: opacity 0.3s, transform 0.3s;
    }
    #back-to-top:hover {
        opacity: 1;
        transform: scale(1.05);
        background: #003d66;
    }
</style>
<button id="back-to-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'});">⬆ TOP</button><p style="text-align:center; margin:20px 0;"><a href="/" style="color:#005A9C; font-weight:500;">🏠 返回首頁</a></p></body>
</html>
