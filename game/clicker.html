<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>點點樂 - 雅寶遊戲間</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #f0f4f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
                /* ============================================================
           頁首樣式（與首頁一致）
           ============================================================ */
        .site-header {
            background: #005A9C;
            color: white;
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 2px 8px rgba(0,0,0,0.10);
            width: 100%;
        }
        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo {
            font-size: 20px;
            font-weight: 700;
            color: white;
            text-decoration: none;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .logo:hover { color: rgba(255,255,255,0.85); }
        .nav-links {
            display: flex;
            gap: 20px;
            font-size: 14px;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            transition: color 0.2s;
        }
        .nav-links a:hover {
            color: white;
            border-bottom: 2px solid #00A86B;
        }
        .nav-links .game-link {
            background: rgba(255,255,255,0.15);
            padding: 4px 14px;
            border-radius: 20px;
            font-weight: 500;
        }
        .nav-links .game-link:hover {
            border-bottom: none;
            background: rgba(255,255,255,0.25);
        }
                /* ============================================================
           頁尾樣式（與首頁一致）
           ============================================================ */
        .site-footer {
            background: #2D3748;
            color: #A0AEC0;
            padding: 40px 0 28px 0;
            margin-top: 40px;
            font-size: 14px;
            width: 100%;
        }
        .footer-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            text-align: center;
        }
        .footer-inner .copy {
            font-size: 13px;
            color: #718096;
        }
        .footer-inner .declaration {
            font-size: 12px;
            color: #FF6F61;
            letter-spacing: 1px;
            font-weight: 300;
            margin-top: 4px;
        }
        .footer-inner a {
            color: #A0AEC0;
            text-decoration: none;
        }
        .footer-inner a:hover {
            color: white;
            text-decoration: underline;
        }
        .game-container {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
            margin: 20px 0;
        }
        h1 { color: #2d3748; margin-bottom: 4px; font-size: 28px; }
        .desc { color: #718096; font-size: 14px; margin-bottom: 16px; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .header .info {
            background: #edf2f7;
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
        }
        .click-area {
            width: 100%;
            aspect-ratio: 1;
            max-width: 350px;
            margin: 0 auto;
            background: linear-gradient(135deg, #005A9C, #003d66);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            cursor: pointer;
            transition: transform 0.1s;
            color: white;
            user-select: none;
        }
        .click-area:active { transform: scale(0.97); }
        .click-area .count { font-size: 72px; font-weight: 900; }
        .click-area .label { font-size: 18px; opacity: 0.8; }
        .click-area .timer { font-size: 24px; margin-top: 8px; opacity: 0.9; }
        .controls {
            margin-top: 16px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .controls button {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: #005A9C;
            color: white;
        }
        .controls button:hover { background: #003d66; transform: scale(1.02); }
        .controls button.danger { background: #e53e3e; }
        .controls button.danger:hover { background: #c53030; }
        .message { margin-top: 12px; font-size: 14px; color: #4a5568; }
        .message.best { color: #38a169; font-weight: 700; }
        @media (max-width: 480px) { h1 { font-size: 22px; } .click-area .count { font-size: 48px; } }
    </style>
</head>
<body>
        <header class="site-header">
        <div class="header-inner">
            <a href="/" class="logo">雅寶社區 · 頂客論壇</a>
            <nav class="nav-links">
                <a href="/">首頁</a>
                <a href="/memorial.html">歲月迴聲</a>
                <a href="/royal_dragon_karma.html">公義史錄</a>
                <a href="/categories.html">📚 全部分類</a>
                <a href="/game/" class="game-link">🎮 遊戲間</a>
            </nav>
        </div>
    </header>    <div class="game-container">
        <h1>👆 點點樂</h1>
        <p class="desc">在時間內盡可能快速點擊！</p>
        <div class="header">
            <span class="info">⏱️ <span id="timer">10</span>s</span>
            <span class="info">👆 <span id="clicks">0</span></span>
            <span class="info">🏆 <span id="best">0</span></span>
        </div>
        <div class="click-area" id="clickArea">
            <div class="count" id="countDisplay">0</div>
            <div class="label" id="statusLabel">點我開始</div>
        </div>
        <div class="controls">
            <button onclick="startGame()">🚀 開始挑戰</button>
            <button class="danger" onclick="resetGame()">🔄 重置</button>
        </div>
        <div class="message" id="message">點擊「開始挑戰」或點擊方塊開始</div>
    </div>
        <footer class="site-footer">
        <div class="footer-inner">
            <div class="copy">&copy; 2026 雅寶社區 · 頂客論壇 (AHPAL.COM) — 版權所有</div>
            <div style="margin-top:6px;font-size:13px;">
                <a href="/sitemap.xml" style="color:#A0AEC0;text-decoration:none;margin:0 12px;">📄 Sitemap</a>
                <a href="/categories.html" style="color:#A0AEC0;text-decoration:none;margin:0 12px;">📚 全部分類</a>
                <a href="/game/" style="color:#A0AEC0;text-decoration:none;margin:0 12px;">🎮 遊戲間</a>
            </div>
            <div class="declaration">「從社區法治，走向知識共創」</div>
        </div>
    </footer>
    <script>
        let clicks = 0, timeLeft = 10, bestScore = parseInt(localStorage.getItem('clickerBest')) || 0;
        let isPlaying = false, timerInterval = null;

        function init() {
            document.getElementById('best').textContent = bestScore;
            document.getElementById('clicks').textContent = clicks;
            document.getElementById('timer').textContent = timeLeft;
            document.getElementById('countDisplay').textContent = clicks;
            document.getElementById('statusLabel').textContent = '點我開始';
        }

        function startGame() {
            if (isPlaying) return;
            clicks = 0; timeLeft = 10; isPlaying = true;
            document.getElementById('clicks').textContent = clicks;
            document.getElementById('timer').textContent = timeLeft;
            document.getElementById('countDisplay').textContent = clicks;
            document.getElementById('statusLabel').textContent = '點我！快點！';
            document.getElementById('message').textContent = '⏱️ 盡可能快速點擊！';
            document.getElementById('message').className = 'message';
            document.getElementById('clickArea').style.background = 'linear-gradient(135deg, #e53e3e, #c53030)';
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').textContent = timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function clickHandler() {
            if (!isPlaying) { startGame(); return; }
            clicks++;
            document.getElementById('clicks').textContent = clicks;
            document.getElementById('countDisplay').textContent = clicks;
            document.getElementById('clickArea').style.transform = 'scale(0.95)';
            setTimeout(() => document.getElementById('clickArea').style.transform = 'scale(1)', 80);
        }

        function endGame() {
            isPlaying = false;
            if (timerInterval) clearInterval(timerInterval);
            document.getElementById('statusLabel').textContent = '時間到！';
            document.getElementById('clickArea').style.background = 'linear-gradient(135deg, #005A9C, #003d66)';
            let msg = '⏱️ 時間到！你點擊了 ' + clicks + ' 次！';
            if (clicks > bestScore) {
                bestScore = clicks; localStorage.setItem('clickerBest', bestScore);
                document.getElementById('best').textContent = bestScore;
                msg += ' 🎉 新紀錄！';
                document.getElementById('message').className = 'message best';
            } else { document.getElementById('message').className = 'message'; }
            document.getElementById('message').textContent = msg;
        }

        function resetGame() {
            if (timerInterval) clearInterval(timerInterval);
            isPlaying = false; clicks = 0; timeLeft = 10;
            document.getElementById('clicks').textContent = clicks;
            document.getElementById('timer').textContent = timeLeft;
            document.getElementById('countDisplay').textContent = clicks;
            document.getElementById('statusLabel').textContent = '點我開始';
            document.getElementById('clickArea').style.background = 'linear-gradient(135deg, #005A9C, #003d66)';
            document.getElementById('message').textContent = '點擊「開始挑戰」或點擊方塊開始';
            document.getElementById('message').className = 'message';
        }

        document.getElementById('clickArea').addEventListener('click', clickHandler);
        init();
    </script>
</body>
</html>
