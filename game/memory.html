<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記憶配對 - 雅寶遊戲間</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft JhengHei", sans-serif; background: #fcfaf2; color: #1c1c1c; min-height: 100vh; }
        .game-nav { background: #005A9C; color: white; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; position: sticky; top: 0; z-index: 50; }
        .game-nav .logo { font-size: 20px; font-weight: 700; color: white; text-decoration: none; }
        .game-nav .nav-links { display: flex; gap: 20px; font-size: 14px; align-items: center; }
        .game-nav .nav-links a { color: rgba(255,255,255,0.85); text-decoration: none; }
        .game-nav .nav-links .back-btn { background: rgba(255,255,255,0.15); padding: 6px 16px; border-radius: 20px; font-weight: 500; }
        .game-nav .nav-links .back-btn:hover { background: rgba(255,255,255,0.25); }
        .game-wrapper { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        .game-container { background: white; border-radius: 16px; padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); border: 1px solid #e6ded1; }
        .game-header { text-align: center; margin-bottom: 24px; }
        .game-header h1 { font-size: 28px; color: #005A9C; }
        .game-area { background: #f7f9fc; border-radius: 12px; padding: 20px; border: 1px solid #e6ded1; text-align: center; }
        .game-area .info { display: flex; justify-content: space-between; margin-bottom: 16px; font-size: 16px; font-weight: bold; color: #005A9C; }
        .game-area .grid { display: grid; gap: 8px; margin: 0 auto; max-width: 500px; }
        .game-area .card { aspect-ratio: 1; background: #005A9C; color: white; border: none; border-radius: 10px; font-size: 32px; cursor: pointer; transition: transform 0.3s, background 0.3s; display: flex; align-items: center; justify-content: center; }
        .game-area .card:hover { transform: scale(1.03); }
        .game-area .card.flipped { background: white; color: #1a202c; cursor: default; }
        .game-area .card.matched { background: #00A86B; color: white; cursor: default; }
        .game-area .card.matched:hover { transform: none; }
        .game-area .controls { margin-top: 16px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .game-area .controls button { padding: 10px 24px; background: #005A9C; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .game-area .controls button:hover { background: #003d66; }
        .game-info { margin-top: 30px; padding: 24px; background: #f7f9fc; border-radius: 12px; border: 1px solid #e6ded1; }
        .game-info h2 { font-size: 18px; color: #005A9C; margin-bottom: 12px; }
        .game-info .how-to-play { background: white; padding: 16px 20px; border-radius: 8px; margin-top: 12px; border-left: 4px solid #00A86B; }
        .game-footer { text-align: center; padding: 30px 0 20px; color: #999; font-size: 13px; border-top: 1px solid #e6ded1; margin-top: 40px; }
        #back-to-top { position: fixed; bottom: 30px; right: 30px; background: #005A9C; color: white; border: none; padding: 12px 16px; border-radius: 50px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); opacity: 0.7; z-index: 999; transition: all 0.3s; }
        #back-to-top:hover { opacity: 1; transform: scale(1.05); background: #003d66; }
        @media (max-width: 500px) { .game-area .card { font-size: 20px; } .game-container { padding: 16px; } }
    </style>
</head>
<body>
    <nav class="game-nav"><a href="/" class="logo">⚖️ 雅寶社區 · 頂客論壇</a><div class="nav-links"><a href="/">首頁</a><a href="/game/" class="back-btn">🎮 返回遊戲間</a></div></nav>
    <div class="game-wrapper">
        <div class="game-container">
            <div class="game-header"><h1>🧠 記憶配對</h1><p class="subtitle">翻牌配對，訓練你的記憶力！</p></div>
            <div class="game-area">
                <div class="info"><span>🎯 配對：<span id="pairsMatched">0</span>/8</span><span>👆 點擊次數：<span id="moves">0</span></span></div>
                <div id="memoryGrid" class="grid" style="grid-template-columns: repeat(4, 1fr);"></div>
                <div class="controls"><button onclick="initMemory()">🔄 新遊戲</button></div>
            </div>
            <div class="game-info">
                <h2>🎯 如何玩記憶配對？</h2>
                <div class="how-to-play"><p><strong>🎮 遊戲目標：</strong>找出所有配對的圖案！</p><p><strong>🖱️ 操作方法：</strong>點擊卡片翻開，連續翻開兩張相同圖案即配對成功。</p></div>
            </div>
        </div>
    </div>
    <footer class="game-footer"><p>&copy; 2026 <a href="/">雅寶社區 · 頂客論壇 (AHPAL.COM)</a> — 遊戲間</p></footer>
    <button id="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">⬆ TOP</button>
    <script>
        const emojis=['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼']; let cards=[], flipped=[], matched=[], moves=0, lock=false;
        function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
        function initMemory(){const deck=[...emojis,...emojis]; cards=shuffle(deck).map((e,i)=>({id:i,emoji:e,flipped:false,matched:false})); flipped=[]; matched=[]; moves=0; lock=false; document.getElementById('pairsMatched').textContent='0'; document.getElementById('moves').textContent='0'; renderMemory();}
        function renderMemory(){const container=document.getElementById('memoryGrid'); container.innerHTML=''; cards.forEach(card=>{const div=document.createElement('div'); div.className='card'; if(card.matched){div.classList.add('matched');div.textContent=card.emoji;}else if(card.flipped){div.classList.add('flipped');div.textContent=card.emoji;}else{div.textContent='❓';} div.addEventListener('click',()=>flipCard(card.id)); container.appendChild(div);});}
        function flipCard(id){if(lock)return;const card=cards[id];if(card.flipped||card.matched||flipped.includes(id))return; card.flipped=true; flipped.push(id); renderMemory(); if(flipped.length===2){moves++;document.getElementById('moves').textContent=moves;lock=true;setTimeout(()=>{const c1=cards[flipped[0]],c2=cards[flipped[1]];if(c1.emoji===c2.emoji){c1.matched=true;c2.matched=true;matched.push(flipped[0],flipped[1]);document.getElementById('pairsMatched').textContent=matched.length/2;if(matched.length===cards.length){setTimeout(()=>alert('🎉 恭喜你完成配對！'),300);}}else{c1.flipped=false;c2.flipped=false;}flipped=[];lock=false;renderMemory();},800);}}
        initMemory();
    </script>
<p style="text-align:center; margin:20px 0;"><a href="/" style="color:#005A9C; font-weight:500;">🏠 返回首頁</a></p></body>
</html>
